<div class="tec-form">
  <input type="text" placeholder="Nombre del técnico"
    [(ngModel)]="nuevoNombre" />
  <input type="text" placeholder="Especialidad"
    [(ngModel)]="nuevoEspecialidad" />
  <button class="btn-registrar" (click)="registrar()">Registrar</button>
</div>

@for (t of tecnicos(); track t.id) {
  <div class="tcard">
    <div class="tc-top">
      <div class="tc-info">
        <div class="tc-name">{{ t.nombre }}</div>
        <div class="tc-esp">{{ t.especialidad }}</div>
      </div>
      <button class="btn-eliminar" (click)="eliminar(t.id)">Eliminar</button>
    </div>
  </div>
} @empty {
  <div class="empty">No hay técnicos registrados</div>
}
