<div class="mini-stats">
  <div class="ms"><div class="mslbl">Total</div><div class="msval">{{ resumen().total }}</div></div>
  <div class="ms"><div class="mslbl">Pendientes</div><div class="msval red">{{ resumen().pendientes }}</div></div>
  <div class="ms"><div class="mslbl">En proceso</div><div class="msval amber">{{ resumen().proceso }}</div></div>
  <div class="ms"><div class="mslbl">Resueltas hoy</div><div class="msval green">{{ resumen().hoy }}</div></div>
</div>

<div class="search-bar">
  <div class="sb-in">
    <span class="sb-ico">🔍</span>
    <input type="text" placeholder="Buscar incidencia, código..."
      (input)="onBuscar($any($event.target).value)" />
  </div>
</div>

<div class="filter-row">
  <select (change)="setEst($any($event.target).value)">
    <option value="all">Todos los estados</option>
    <option value="pendiente">Pendiente</option>
    <option value="proceso">En proceso</option>
    <option value="resuelto">Resuelto</option>
  </select>
  <select (change)="setCat($any($event.target).value)">
    <option value="all">Categoría</option>
    <option value="Infraestructura">Infraestructura</option>
    <option value="Servicios">Servicios</option>
    <option value="Limpieza">Limpieza</option>
  </select>
</div>

@for (inc of filtradas(); track inc.id) {
  <div class="icard" (click)="verDetalle(inc)">
    <div class="ic-top">
      <div>
        <div class="ic-code">{{ inc.codigo }}</div>
        <div class="ic-title">{{ inc.categoria }} — {{ inc.zona }}</div>
      </div>
      <select class="estado-select" [ngClass]="getTagClass(inc.estado)"
        [value]="inc.estado"
        (change)="cambiarEstado(inc, $any($event.target).value)"
        (click)="$event.stopPropagation()">
        <option value="pendiente">Pendiente</option>
        <option value="proceso">En proceso</option>
        <option value="resuelto">Resuelto</option>
      </select>
    </div>
    <div class="ic-bottom">
      <span class="ic-zone">📍 {{ inc.zona }}</span>
      <span class="ic-tec" [class.noasign]="!inc.personal_asignado">
        <select
          (click)="$event.stopPropagation()"
          (change)="asignarTecnico(inc, $any($event.target).value)">
          <option value="">{{ inc.personal_asignado ?? 'Sin asignar' }}</option>
          @for (t of tecnicos(); track t.id) {
            <option [value]="t.nombre">{{ t.nombre }}</option>
          }
        </select>
      </span>
    </div>
  </div>
} @empty {
  <div class="empty">No hay incidencias con estos filtros</div>
}
