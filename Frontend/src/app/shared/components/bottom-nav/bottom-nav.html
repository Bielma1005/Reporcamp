<nav class="bottom-nav">
  <a
    *ngFor="let item of navItems"
    [routerLink]="item.path"
    routerLinkActive="active"
    class="nav-item"
    (click)="goTo(item)"
    [hidden]="item.path === '/admin' && !auth.isAdmin"
  >
    <span class="nav-icon">{{ item.icon }}</span>
    <span class="nav-label">{{ item.label }}</span>
  </a>
</nav>
